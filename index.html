<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英语词汇选择练习 U4-U6</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #cfcfcf;
      --ink: #202020;
      --muted: #777777;
      --line: #e2e2e2;
      --panel: #ffffff;
      --accent: #e36a4a;
      --accent-dark: #b94d34;
      --dark: #303030;
      --dark-2: #505050;
      --green: #27805a;
      --red: #c54b3f;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #d4d4d4 0%, #cfcfcf 42%, #737373 100%);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    button, select {
      font: inherit;
    }

    .app {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 48px;
    }

    .topbar {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 190px;
      text-align: center;
      margin-bottom: 18px;
      overflow: hidden;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      font-size: clamp(38px, 7vw, 78px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .topbar::before {
      content: "VOCAB QUIZ";
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: 100%;
      color: rgba(255, 255, 255, 0.34);
      font-size: clamp(64px, 13vw, 138px);
      font-weight: 900;
      line-height: 0.9;
      white-space: nowrap;
      pointer-events: none;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      margin: 0;
      color: rgba(32, 32, 32, 0.64);
      line-height: 1.6;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(76px, 1fr));
      gap: 8px;
      width: min(360px, 100%);
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .stat {
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 58px;
      backdrop-filter: blur(14px);
    }

    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 176px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel, .quiz-card {
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .panel {
      min-height: 640px;
      padding: 20px 16px;
      position: sticky;
      top: 16px;
      background: linear-gradient(160deg, #555 0%, #2d2d2d 55%, #262626 100%);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f3f3f3;
    }

    .section-title {
      margin: 22px 0 9px;
      font-weight: 700;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      text-transform: uppercase;
    }

    .section-title:first-child { margin-top: 0; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .segmented.units {
      grid-template-columns: 1fr;
    }

    .segmented.parts {
      grid-template-columns: 1fr;
    }

    .segmented button, .action, .option, .ghost {
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      min-height: 42px;
      padding: 9px 10px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .segmented button:hover, .action:hover, .option:hover, .ghost:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .segmented button.active {
      background: #f5f5f5;
      border-color: #fff;
      color: #151515;
    }

    .segmented button {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.78);
      text-align: left;
      padding-left: 14px;
    }

    .segmented button::before {
      content: "";
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-right: 8px;
      background: rgba(255,255,255,0.42);
      vertical-align: 1px;
    }

    .segmented button.active::before {
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(227, 106, 74, 0.14);
    }

    .action {
      width: 100%;
      margin-top: 16px;
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(227, 106, 74, 0.24);
    }

    .ghost {
      background: rgba(255,255,255,0.08);
      width: 100%;
      margin-top: 8px;
      color: rgba(255,255,255,0.86);
      font-weight: 700;
    }

    .action:disabled {
      background: #dfdfdf;
      border-color: #dfdfdf;
      color: #8c8c8c;
      box-shadow: none;
      cursor: not-allowed;
    }

    .quiz-card .ghost {
      background: rgba(255,255,255,0.72);
      color: #555;
      border-color: #e1e1e1;
    }

    .quiz-card .ghost:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .pool-line {
      margin: 12px 0 0;
      color: rgba(255,255,255,0.58);
      line-height: 1.55;
      font-size: 13px;
    }

    .quiz-card {
      min-height: 640px;
      padding: clamp(18px, 4vw, 30px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f3f3f3 62%, #e7e7e7 100%);
      border: 1px solid rgba(255,255,255,0.82);
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef4f2;
      color: #333;
      border: 1px solid #e2e2e2;
      font-size: 13px;
      font-weight: 700;
    }

    .progress {
      min-width: 180px;
      flex: 1;
      max-width: 360px;
    }

    .progress-track {
      height: 10px;
      background: #e1e1e1;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #2d2d2d);
      transition: width 0.2s ease;
    }

    .question {
      margin: 0;
      font-size: clamp(22px, 3vw, 31px);
      line-height: 1.42;
      letter-spacing: 0;
    }

    .question .blank {
      display: inline-block;
      min-width: 128px;
      border-bottom: 3px solid var(--accent);
      color: var(--accent);
      text-align: center;
      padding: 0 8px 2px;
      font-weight: 800;
    }

    .bank {
      border: 1px solid #ececec;
      background: rgba(255,255,255,0.68);
      border-radius: 18px;
      padding: 12px;
    }

    .bank-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .word {
      padding: 5px 8px;
      border-radius: 6px;
      background: #eef1ef;
      color: #243037;
      font-size: 13px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      min-height: 54px;
      font-weight: 750;
      font-size: 16px;
      overflow-wrap: anywhere;
      touch-action: manipulation;
    }

    .option.selected {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(227, 106, 74, 0.28), 0 10px 22px rgba(227, 106, 74, 0.12);
      color: var(--accent-dark);
    }

    .option.correct {
      background: #e6f4ec;
      border-color: var(--green);
      color: var(--green);
    }

    .option.wrong {
      background: #fbebe8;
      border-color: var(--red);
      color: var(--red);
    }

    .option:disabled {
      cursor: default;
      transform: none;
      opacity: 0.88;
    }

    .feedback {
      display: none;
      border-radius: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      background: #fbfcfb;
    }

    .feedback.show { display: block; }
    .feedback.good { border-color: #a7d9bd; background: #f0faf4; }
    .feedback.bad { border-color: #edb5ad; background: #fff4f2; }

    .feedback-title {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 800;
    }

    .feedback p {
      margin: 6px 0;
      line-height: 1.65;
    }

    .translation-view {
      display: none;
    }

    .translation-view.show {
      display: block;
    }

    .translation-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .translation-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .translation-list {
      display: grid;
      gap: 12px;
    }

    .translation-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.72);
      cursor: pointer;
    }

    .translation-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 9px;
    }

    .translation-english {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.55;
    }

    .mask-box {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #e8e8e8;
      background: #fff;
      padding: 12px;
      line-height: 1.65;
      color: #2b2b2b;
    }

    .mask-box + .mask-box {
      margin-top: 8px;
    }

    .translation-card.masked .mask-box > * {
      filter: blur(6px);
      user-select: none;
    }

    .translation-card.masked .mask-box::after {
      content: "点击显示";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(48,48,48,0.92), rgba(95,95,95,0.86));
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    .translation-words {
      font-size: 13px;
      color: var(--muted);
    }

    .controls-row {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }

    .controls-row .action, .controls-row .ghost {
      margin-top: 0;
      width: auto;
      min-width: 140px;
      padding-inline: 16px;
    }

    .summary {
      display: none;
    }

    .summary.show {
      display: block;
    }

    .summary h2 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
    }

    .wrong-item b { color: var(--red); }
    .hidden { display: none !important; }

    @media (max-width: 860px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
      .layout {
        grid-template-columns: 1fr;
      }
      .panel {
        position: static;
        min-height: auto;
        order: 2;
      }
      .quiz-card {
        order: 1;
      }
      .segmented, .segmented.units, .segmented.parts {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .segmented:first-of-type {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .segmented button {
        text-align: center;
        padding-left: 10px;
      }
      .options {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 540px) {
      body {
        background: linear-gradient(180deg, #d9d9d9 0%, #c9c9c9 52%, #838383 100%);
      }
      .app {
        width: min(100% - 14px, 1160px);
        padding: 10px 0 calc(18px + env(safe-area-inset-bottom));
      }
      .topbar {
        min-height: 112px;
        margin-bottom: 8px;
        align-items: start;
      }
      .topbar::before {
        top: 42%;
        font-size: 52px;
        color: rgba(255,255,255,0.32);
      }
      h1 {
        margin-top: 6px;
        font-size: 31px;
        line-height: 1.05;
      }
      .subtitle {
        width: min(310px, 100%);
        margin-inline: auto;
        font-size: 12px;
        line-height: 1.4;
      }
      .stats {
        grid-template-columns: repeat(3, 1fr);
        width: min(300px, 100%);
        margin-top: 8px;
        gap: 6px;
      }
      .stat {
        min-height: 48px;
        padding: 7px 8px;
        border-radius: 12px;
      }
      .stat b {
        font-size: 17px;
      }
      .stat span {
        margin-top: 3px;
        font-size: 10px;
      }
      .layout {
        gap: 8px;
      }
      .panel {
        order: 1;
        padding: 10px;
        border-radius: 20px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      }
      .quiz-card {
        order: 2;
        min-height: auto;
        border-radius: 20px;
        padding: 12px;
        gap: 10px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.16);
      }
      .section-title {
        margin: 9px 2px 6px;
        font-size: 10px;
      }
      .segmented, .segmented.units, .segmented.parts {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .segmented:first-of-type {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .segmented button {
        min-height: 38px;
        padding: 7px 6px;
        font-size: 13px;
        text-align: center;
      }
      .segmented button::before {
        width: 7px;
        height: 7px;
        margin-right: 5px;
      }
      .action, .ghost {
        min-height: 42px;
      }
      .panel .action {
        margin-top: 10px;
        min-height: 44px;
      }
      .panel .ghost {
        min-height: 40px;
      }
      .pool-line {
        margin-top: 7px;
        font-size: 11px;
        text-align: center;
      }
      .meta-row {
        gap: 8px;
      }
      .pill-row {
        gap: 6px;
      }
      .pill {
        min-height: 26px;
        padding: 4px 8px;
        font-size: 12px;
      }
      .progress {
        min-width: 100%;
        max-width: none;
      }
      .progress-track {
        height: 7px;
      }
      .question {
        font-size: 18px;
        line-height: 1.5;
      }
      .question .blank {
        min-width: 86px;
        border-bottom-width: 2px;
      }
      .bank {
        padding: 9px;
        border-radius: 14px;
      }
      .bank-label {
        margin-bottom: 6px;
        font-size: 11px;
      }
      .word-list {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .word-list::-webkit-scrollbar {
        display: none;
      }
      .word {
        flex: 0 0 auto;
        font-size: 11px;
        padding: 5px 7px;
      }
      .options {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .option {
        min-height: 48px;
        padding: 8px 6px;
        font-size: 13px;
        line-height: 1.2;
      }
      .feedback {
        border-radius: 14px;
        padding: 10px;
        font-size: 13px;
      }
      .feedback-title {
        font-size: 15px;
      }
      .feedback p {
        line-height: 1.55;
      }
      .controls-row {
        position: sticky;
        bottom: calc(8px + env(safe-area-inset-bottom));
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 104px;
        gap: 8px;
        margin: 0 -4px -4px;
        padding: 8px;
        border-radius: 18px;
        background: rgba(245,245,245,0.92);
        border: 1px solid rgba(255,255,255,0.78);
        box-shadow: 0 12px 30px rgba(0,0,0,0.16);
        backdrop-filter: blur(14px);
      }
      .controls-row .action, .controls-row .ghost {
        width: 100%;
        min-width: 0;
        min-height: 48px;
        padding-inline: 10px;
        font-size: 15px;
      }
      .summary h2 {
        font-size: 24px;
      }
      .wrong-list {
        gap: 8px;
      }
      .wrong-item {
        border-radius: 14px;
        padding: 10px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>英语词汇选择练习 U4-U6</h1>
        <p class="subtitle">随机打乱题目顺序，选择答案后立即判断，并显示正确答案与中文翻译。</p>
      </div>
      <div class="stats" aria-label="练习统计">
        <div class="stat"><b id="doneCount">0</b><span>已答</span></div>
        <div class="stat"><b id="rightCount">0</b><span>正确</span></div>
        <div class="stat"><b id="accuracy">0%</b><span>正确率</span></div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="section-title">板块</div>
        <div class="segmented" role="group" aria-label="板块">
          <button class="active" data-section="quiz">词汇填空</button>
          <button data-section="translate">翻译背诵</button>
        </div>

        <div id="rangeControls">
          <div class="section-title">练习范围</div>
          <div class="segmented" role="group" aria-label="练习范围">
            <button class="active" data-mode="unit">各单元</button>
            <button data-mode="all">全部题库</button>
          </div>
        </div>

        <div id="unitControls">
          <div class="section-title">单元</div>
          <div class="segmented units" role="group" aria-label="单元">
            <button class="active" data-unit="U4">U4</button>
            <button data-unit="U5">U5</button>
            <button data-unit="U6">U6</button>
          </div>
        </div>

        <div id="partControls">
          <div class="section-title">题型</div>
          <div class="segmented parts" role="group" aria-label="题型">
            <button class="active" data-part="all">全部</button>
            <button data-part="Part 1">Part 1</button>
            <button data-part="Part 2">Part 2</button>
          </div>
        </div>

        <button id="startBtn" class="action">重新随机</button>
        <button id="wrongOnlyBtn" class="ghost hidden">只练错题</button>
        <p class="pool-line" id="poolInfo"></p>
      </aside>

      <section class="quiz-card" aria-live="polite">
        <div id="quizView">
          <div class="meta-row">
            <div class="pill-row">
              <span class="pill" id="sourcePill">U4 · Part 1</span>
              <span class="pill" id="indexPill">第 1 题</span>
            </div>
            <div class="progress" aria-hidden="true">
              <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            </div>
          </div>

          <p class="question" id="questionText"></p>

          <div class="bank">
            <p class="bank-label">原词库</p>
            <div class="word-list" id="wordBank"></div>
          </div>

          <div class="options" id="options"></div>

          <div class="feedback" id="feedback">
            <p class="feedback-title" id="feedbackTitle"></p>
            <p id="answerLine"></p>
            <p id="translationLine"></p>
          </div>

          <div class="controls-row">
            <button id="nextBtn" class="action" disabled>下一题</button>
            <button id="skipBtn" class="ghost">跳过</button>
          </div>
        </div>

        <div id="summaryView" class="summary">
          <h2>本轮完成</h2>
          <p id="summaryText" class="subtitle"></p>
          <div id="wrongList" class="wrong-list"></div>
          <div class="controls-row">
            <button id="againBtn" class="action">再来一轮</button>
            <button id="reviewWrongBtn" class="ghost hidden">重练错题</button>
          </div>
        </div>

        <div id="translationView" class="translation-view">
          <div class="translation-toolbar">
            <h2 class="translation-title">翻译背诵</h2>
            <button id="maskAllBtn" class="ghost">全部遮住</button>
          </div>
          <div id="translationList" class="translation-list"></div>
        </div>
      </section>
    </section>
  </main>

  <script id="quiz-data" type="application/json">{

}</script>
  <script>
    const DATA = JSON.parse(document.getElementById('quiz-data').textContent);
    const state = {
      section: 'quiz',
      mode: 'unit',
      unit: 'U4',
      part: 'all',
      queue: [],
      index: 0,
      done: 0,
      right: 0,
      answered: false,
      selectedAnswer: '',
      wrong: [],
      optionPool: [],
      currentOptions: [],
      revealAll: false
    };

    const els = {
      doneCount: document.getElementById('doneCount'),
      rightCount: document.getElementById('rightCount'),
      accuracy: document.getElementById('accuracy'),
      rangeControls: document.getElementById('rangeControls'),
      unitControls: document.getElementById('unitControls'),
      partControls: document.getElementById('partControls'),
      poolInfo: document.getElementById('poolInfo'),
      startBtn: document.getElementById('startBtn'),
      wrongOnlyBtn: document.getElementById('wrongOnlyBtn'),
      sourcePill: document.getElementById('sourcePill'),
      indexPill: document.getElementById('indexPill'),
      progressFill: document.getElementById('progressFill'),
      questionText: document.getElementById('questionText'),
      wordBank: document.getElementById('wordBank'),
      options: document.getElementById('options'),
      feedback: document.getElementById('feedback'),
      feedbackTitle: document.getElementById('feedbackTitle'),
      answerLine: document.getElementById('answerLine'),
      translationLine: document.getElementById('translationLine'),
      nextBtn: document.getElementById('nextBtn'),
      skipBtn: document.getElementById('skipBtn'),
      quizView: document.getElementById('quizView'),
      summaryView: document.getElementById('summaryView'),
      summaryText: document.getElementById('summaryText'),
      wrongList: document.getElementById('wrongList'),
      againBtn: document.getElementById('againBtn'),
      reviewWrongBtn: document.getElementById('reviewWrongBtn'),
      translationView: document.getElementById('translationView'),
      translationList: document.getElementById('translationList'),
      maskAllBtn: document.getElementById('maskAllBtn')
    };

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getPool() {
      return DATA.questions.filter(q => {
        const unitOk = state.mode === 'all' || q.unit === state.unit;
        const partOk = state.part === 'all' || q.part === state.part;
        return unitOk && partOk;
      });
    }

    function getTranslationPool() {
      return DATA.translationNotes.filter(item => item.unit === state.unit);
    }

    function setActive(groupSelector, attr, value) {
      document.querySelectorAll(groupSelector).forEach(button => {
        button.classList.toggle('active', button.dataset[attr] === value);
      });
    }

    function updatePoolInfo() {
      const count = state.section === 'translate' ? getTranslationPool().length : getPool().length;
      const range = state.section === 'translate' ? state.unit : (state.mode === 'all' ? '全部题库' : state.unit);
      const part = state.section === 'translate' ? '翻译背诵' : (state.part === 'all' ? '全部题型' : state.part);
      els.poolInfo.textContent = `当前范围：${range} · ${part} · ${count} 条`;
      els.rangeControls.classList.toggle('hidden', state.section === 'translate');
      els.unitControls.classList.toggle('hidden', state.section !== 'translate' && state.mode === 'all');
      els.partControls.classList.toggle('hidden', state.section === 'translate');
    }

    function setSection(section) {
      state.section = section;
      if (section === 'translate') {
        state.mode = 'unit';
        setActive('[data-mode]', 'mode', state.mode);
      }
      setActive('[data-section]', 'section', section);
      els.quizView.classList.toggle('hidden', section !== 'quiz');
      els.summaryView.classList.remove('show');
      els.translationView.classList.toggle('show', section === 'translate');
      updatePoolInfo();
      if (section === 'translate') {
        renderTranslation();
      } else {
        startRound();
      }
    }

    function startRound(customPool = null) {
      const pool = customPool || getPool();
      state.optionPool = getPool();
      state.queue = shuffle(pool);
      state.index = 0;
      state.done = 0;
      state.right = 0;
      state.answered = false;
      state.selectedAnswer = '';
      state.wrong = customPool ? state.wrong : [];
      els.quizView.classList.remove('hidden');
      els.summaryView.classList.remove('show');
      els.reviewWrongBtn.classList.add('hidden');
      renderStats();
      renderQuestion();
    }

    function renderStats() {
      els.doneCount.textContent = state.done;
      els.rightCount.textContent = state.right;
      els.accuracy.textContent = state.done ? `${Math.round((state.right / state.done) * 100)}%` : '0%';
      els.wrongOnlyBtn.classList.toggle('hidden', state.wrong.length === 0);
    }

    function blankPrompt(text, answer = '') {
      const safeAnswer = answer ? answer : '&nbsp;';
      return text.replace('______', `<span class="blank">${safeAnswer}</span>`);
    }

    function renderQuestion() {
      if (!state.queue.length || state.index >= state.queue.length) {
        showSummary();
        return;
      }
      const q = state.queue[state.index];
      state.answered = false;
      state.selectedAnswer = '';
      state.currentOptions = shuffle(unique(state.optionPool.map(item => item.answer)));
      els.sourcePill.textContent = `${q.unit} · ${q.part}`;
      els.indexPill.textContent = `${state.index + 1} / ${state.queue.length}`;
      els.progressFill.style.width = `${(state.index / state.queue.length) * 100}%`;
      els.questionText.innerHTML = blankPrompt(q.prompt);
      els.wordBank.innerHTML = q.wordBank.map(word => `<span class="word">${escapeHtml(word)}</span>`).join('');
      els.options.innerHTML = state.currentOptions.map(option => (
        `<button class="option" data-answer="${escapeAttr(option)}">${escapeHtml(option)}</button>`
      )).join('');
      els.feedback.className = 'feedback';
      els.feedbackTitle.textContent = '';
      els.answerLine.textContent = '';
      els.translationLine.textContent = '';
      els.nextBtn.disabled = true;
      els.nextBtn.textContent = '确认答案';
      els.skipBtn.disabled = false;
    }

    function selectAnswer(answer) {
      if (state.answered) return;
      state.selectedAnswer = answer;
      document.querySelectorAll('.option').forEach(button => {
        button.classList.toggle('selected', button.dataset.answer === answer);
      });
      els.nextBtn.disabled = false;
    }

    function confirmAnswer() {
      if (state.answered || !state.selectedAnswer) return;
      const q = state.queue[state.index];
      const correct = state.selectedAnswer === q.answer;
      state.answered = true;
      state.done += 1;
      if (correct) {
        state.right += 1;
      } else {
        state.wrong.push(q);
      }

      document.querySelectorAll('.option').forEach(button => {
        const value = button.dataset.answer;
        button.disabled = true;
        if (value === q.answer) button.classList.add('correct');
        if (value === state.selectedAnswer && value !== q.answer) button.classList.add('wrong');
      });

      els.questionText.innerHTML = blankPrompt(q.prompt, q.answer);
      els.feedback.className = `feedback show ${correct ? 'good' : 'bad'}`;
      els.feedbackTitle.textContent = correct ? '回答正确' : '回答错误';
      els.answerLine.innerHTML = `正确答案：<strong>${escapeHtml(q.answer)}</strong>`;
      els.translationLine.textContent = `中文翻译：${q.translation}`;
      els.nextBtn.disabled = false;
      els.nextBtn.textContent = '下一题';
      els.skipBtn.disabled = true;
      els.progressFill.style.width = `${((state.index + 1) / state.queue.length) * 100}%`;
      renderStats();
    }

    function skip() {
      if (state.answered) return;
      state.index += 1;
      renderQuestion();
    }

    function next() {
      state.index += 1;
      renderQuestion();
    }

    function confirmOrNext() {
      if (state.answered) {
        next();
      } else {
        confirmAnswer();
      }
    }

    function showSummary() {
      els.quizView.classList.add('hidden');
      els.summaryView.classList.add('show');
      els.progressFill.style.width = '100%';
      const total = state.done;
      const rate = total ? Math.round((state.right / total) * 100) : 0;
      els.summaryText.textContent = `答题 ${total} 道，正确 ${state.right} 道，正确率 ${rate}%。`;
      els.wrongList.innerHTML = state.wrong.length
        ? state.wrong.map(q => `
          <div class="wrong-item">
            <p><b>${q.unit} · ${q.part} · 第 ${q.number} 题</b></p>
            <p>${escapeHtml(q.prompt)}</p>
            <p>答案：<strong>${escapeHtml(q.answer)}</strong></p>
            <p>${escapeHtml(q.translation)}</p>
          </div>
        `).join('')
        : '<div class="wrong-item"><strong>没有错题，本轮很稳。</strong></div>';
      els.reviewWrongBtn.classList.toggle('hidden', state.wrong.length === 0);
      els.wrongOnlyBtn.classList.toggle('hidden', state.wrong.length === 0);
    }

    function renderTranslation() {
      const items = getTranslationPool();
      els.translationList.innerHTML = items.map(item => `
        <article class="translation-card ${state.revealAll ? '' : 'masked'}" data-id="${escapeAttr(item.id)}">
          <div class="translation-meta">
            <span class="pill">${escapeHtml(item.unit)}</span>
            <span class="pill">第 ${item.number} 句</span>
          </div>
          <p class="translation-english">${escapeHtml(item.english)}</p>
          <div class="mask-box"><p>${escapeHtml(item.chinese)}</p></div>
          <div class="mask-box translation-words"><p>${escapeHtml(item.words)}</p></div>
        </article>
      `).join('');
      els.maskAllBtn.textContent = state.revealAll ? '全部遮住' : '全部显示';
    }

    function toggleTranslationCard(card) {
      card.classList.toggle('masked');
    }

    function toggleAllMasks() {
      state.revealAll = !state.revealAll;
      renderTranslation();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    function unique(items) {
      return [...new Set(items)];
    }

    document.querySelectorAll('[data-section]').forEach(button => {
      button.addEventListener('click', () => setSection(button.dataset.section));
    });

    document.querySelectorAll('[data-mode]').forEach(button => {
      button.addEventListener('click', () => {
        state.mode = button.dataset.mode;
        setActive('[data-mode]', 'mode', state.mode);
        updatePoolInfo();
        if (state.section === 'translate') renderTranslation();
        else startRound();
      });
    });

    document.querySelectorAll('[data-unit]').forEach(button => {
      button.addEventListener('click', () => {
        state.unit = button.dataset.unit;
        setActive('[data-unit]', 'unit', state.unit);
        updatePoolInfo();
        if (state.section === 'translate') renderTranslation();
        else startRound();
      });
    });

    document.querySelectorAll('[data-part]').forEach(button => {
      button.addEventListener('click', () => {
        state.part = button.dataset.part;
        setActive('[data-part]', 'part', state.part);
        updatePoolInfo();
        if (state.section === 'translate') renderTranslation();
        else startRound();
      });
    });

    els.startBtn.addEventListener('click', () => startRound());
    els.againBtn.addEventListener('click', () => startRound());
    els.wrongOnlyBtn.addEventListener('click', () => startRound(state.wrong));
    els.reviewWrongBtn.addEventListener('click', () => startRound(state.wrong));
    els.nextBtn.addEventListener('click', confirmOrNext);
    els.skipBtn.addEventListener('click', skip);
    els.options.addEventListener('click', event => {
      const button = event.target.closest('.option');
      if (button) selectAnswer(button.dataset.answer);
    });
    els.translationList.addEventListener('click', event => {
      const card = event.target.closest('.translation-card');
      if (card) toggleTranslationCard(card);
    });
    els.maskAllBtn.addEventListener('click', toggleAllMasks);

    document.addEventListener('keydown', event => {
      if (/^[1-9]$/.test(event.key) && !state.answered) {
        const index = Number(event.key) - 1;
        const option = document.querySelectorAll('.option')[index];
        if (option) option.click();
      }
      if (event.key === 'Enter' && state.answered) next();
    });

    updatePoolInfo();
    startRound();
  </script>
</body>
